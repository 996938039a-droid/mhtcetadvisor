# College Types
college_types:
  - code: "GOVT"
    name: "Government"
    description: "State government-run institutions"
    fee_range: "Low (₹10K-50K/year)"
  
  - code: "GOVT_AUTO"
    name: "Government Autonomous"
    description: "Government colleges with autonomous status"
    fee_range: "Low (₹10K-50K/year)"
  
  - code: "AIDED"
    name: "Aided"
    description: "Private colleges receiving government aid"
    fee_range: "Medium (₹50K-1L/year)"
  
  - code: "UNAIDED"
    name: "Un-Aided (Private)"
    description: "Self-financed private institutions"
    fee_range: "High (₹1L-2L/year)"
  
  - code: "UNAIDED_AUTO"
    name: "Un-Aided Autonomous"
    description: "Private autonomous institutions"
    fee_range: "High (₹1L-2.5L/year)"
  
  - code: "UNIV_DEPT"
    name: "University Department"
    description: "University-run engineering departments"
    fee_range: "Low-Medium"
  
  - code: "MINORITY"
    name: "Minority Institution"
    description: "Institutions for religious/linguistic minorities"
    fee_range: "Varies"

# CAP Rounds
cap_rounds:
  - round: 1
    name: "CAP Round I"
    typical_timing: "August"
    notes: "First allotment, highest cutoffs"
  
  - round: 2
    name: "CAP Round II"
    typical_timing: "August-September"
    notes: "Second allotment, cutoffs may drop 1-3 percentile"
  
  - round: 3
    name: "CAP Round III"
    typical_timing: "September"
    notes: "Third allotment, significant cutoff drops possible"
  
  - round: 4
    name: "CAP Round IV"
    typical_timing: "September-October"
    notes: "Final CAP round, lowest cutoffs"
  
  - round: "ACAP"
    name: "Institute Level Rounds"
    typical_timing: "October onwards"
    notes: "Direct admission to vacant seats"

