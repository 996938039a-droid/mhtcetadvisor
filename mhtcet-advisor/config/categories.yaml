    cities: ["Pune", "Ahmednagar", "Nashik"]
  
  - code: "RTMNU"
    name: "Rashtrasant Tukadoji Maharaj Nagpur University"
    cities: ["Nagpur", "Bhandara", "Gondia", "Wardha", "Chandrapur"]
  
  - code: "SGBAU"
    name: "Sant Gadge Baba Amravati University"
    cities: ["Amravati", "Akola", "Buldhana", "Yavatmal", "Washim"]
  
  - code: "BAMU"
    name: "Dr. Babasaheb Ambedkar Marathwada University"
    cities: ["Aurangabad", "Jalna", "Beed", "Osmanabad"]
  
  - code: "SRTMUN"
    name: "Swami Ramanand Teerth Marathwada University"
    cities: ["Nanded", "Latur", "Parbhani", "Hingoli"]
  
  - code: "DBATU"
    name: "Dr. Babasaheb Ambedkar Technological University"
    cities: ["Lonere", "Raigad"]
  
  - code: "NMU"
    name: "North Maharashtra University"
